<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Theme Showcase - Tempest Charts</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f3f4f6;
            padding: 2rem;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        header {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            margin-bottom: 2rem;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        }
        h1 {
            color: #111827;
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }
        .breadcrumb {
            color: #6b7280;
            font-size: 0.9rem;
        }
        .breadcrumb a {
            color: #3b82f6;
            text-decoration: none;
        }
        .chart-card {
            background: white;
            padding: 1.5rem;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
            margin-bottom: 1.5rem;
        }
        .chart-card.dark {
            background: #1f2937;
        }
        .chart-title {
            font-size: 1.25rem;
            font-weight: 600;
            color: #374151;
            margin-bottom: 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 2px solid #e5e7eb;
        }
        .chart-card.dark .chart-title {
            color: #f9fafb;
            border-bottom-color: #4b5563;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>🌈 Theme Showcase</h1>
            <div class="breadcrumb">
                <a href="/">Home</a> / Theme Showcase
                <p style="margin-top: 0.5rem; color: #6b7280;">Compare different chart themes</p>
            </div>
        </header>

        <div class="chart-card">
            <div class="chart-title">Tempest Light Theme</div>
            {{ light_chart | safe }}
        </div>

        <div class="chart-card dark">
            <div class="chart-title">Tempest Dark Theme</div>
            {{ dark_chart | safe }}
        </div>

        <div class="chart-card">
            <div class="chart-title">Vintage Theme</div>
            {{ vintage_chart | safe }}
        </div>
    </div>
</body>
</html>
